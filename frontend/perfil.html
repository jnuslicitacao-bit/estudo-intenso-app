<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estudo Intenso - Meu Desempenho</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 800px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: auto; }
        .grid-stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { flex: 1; padding: 20px; background: #f8f9fa; border-radius: 6px; text-align: center; border-left: 5px solid #007bff; }
        .stat-card.redacao { border-left-color: #ffc107; }
        .stat-card h3 { margin: 0; color: #666; font-size: 14px; }
        .stat-card p { margin: 10px 0 0 0; font-size: 28px; font-weight: bold; color: #222; }
        .grafico-bloco { margin-top: 20px; height: 300px; }
        .btn-voltar { background-color: #6c757d; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .btn-lista { text-align: left; background: #fff; border: 1px solid #cbd5e1; padding: 12px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; font-size: 15px; font-weight: 500; color: #334155; transition: 0.2s; width: 100%; }
        .btn-lista:hover { background: #f8fafc; border-color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-voltar">← Voltar ao Dashboard</a>
    <h2>Análise de Desempenho Estratégico</h2>
    <p>Acompanhe sua evolução ativa para garantir a fixação do conteúdo.</p>

    <div class="grid-stats">
        <div class="stat-card">
            <h3>Taxa Média nos Simulados</h3>
            <p id="txt-media-simulado">--%</p>
        </div>
        <div class="stat-card redacao">
            <h3>Última Nota de Redação</h3>
            <p id="txt-ultima-redacao">---/1000</p>
        </div>
    </div>

    <div class="grafico-bloco">
        <canvas id="graficoEvolucao"></canvas>
    </div>

    <div style="margin-top: 40px;">
        <h3>Histórico de Redações e Feedbacks IA</h3>
        <div id="lista-redacoes" style="display: flex; flex-direction: column; gap: 10px;">
            </div>
    </div>

    <div id="painel-revisao" style="display: none; margin-top: 25px; padding: 20px; background: #fff; border: 1px solid #ddd; border-radius: 6px;">
        <h4 id="revisao-tema" style="margin-top: 0; color: #007bff;"></h4>
        <div style="display: flex; gap: 20px; margin-top: 15px;">
            <div style="flex: 1; background: #fafafa; padding: 15px; border-radius: 4px; border: 1px solid #eee;">
                <h5 style="margin-top:0;">Seu Texto Original:</h5>
                <p id="revisao-texto" style="white-space: pre-wrap; font-size: 14px; color: #333; line-height: 1.6;"></p>
            </div>
            <div style="flex: 1; background: #fff9e6; padding: 15px; border-radius: 4px; border: 1px solid #ffeeba;">
                <h5 style="margin-top:0;">Análise da OpenAI:</h5>
                <p id="revisao-feedback" style="white-space: pre-wrap; font-size: 14px; color: #856404; line-height: 1.6;"></p>
            </div>
        </div>
    </div>
</div>

<script>
    const dadosUsuario = localStorage.getItem('usuario_estudo');
    if (!dadosUsuario) {
        alert("Acesso negado! Por favor, faça login primeiro.");
        window.location.href = 'login.html';
    }

    async function carregarDadosDesempenho() {
        try {
            const usuario = JSON.parse(dadosUsuario);
            const resposta = await fetch(`http://localhost:5000/api/desempenho?usuario_id=${usuario.id}`);
            const dados = await resposta.json();

            if (dados.status === "sucesso") {
                document.getElementById('txt-media-simulado').innerText = dados.media_simulado + "%";
                
                const temRedacao = dados.historico_redacoes.length > 0;
                document.getElementById('txt-ultima-redacao').innerText = temRedacao ? dados.historico_redacoes[0].nota + "/1000" : "Nenhuma";

                // Renderiza Lista de Revisão
                const listaDiv = document.getElementById('lista-redacoes');
                listaDiv.innerHTML = '';

                if (!temRedacao) {
                    listaDiv.innerHTML = '<p style="color: #888; font-style: italic;">Você ainda não enviou nenhuma redação para correção.</p>';
                } else {
                    dados.historico_redacoes.forEach((redacao) => {
                        const botao = document.createElement('button');
                        botao.className = 'btn-lista';
                        botao.innerHTML = `<span>📝 <strong>Tema:</strong> ${redacao.tema}</span> <strong style="color: #e0a800;">Nota: ${redacao.nota}/1000</strong>`;
                        botao.onclick = () => abrirRevisao(redacao);
                        listaDiv.appendChild(botao);
                    });
                }

                // Renderiza o gráfico usando Chart.js
                const notasRedacao = temRedacao ? dados.historico_redacoes.map(r => r.nota).reverse() : [0];
                const labelsRedacao = temRedacao ? dados.historico_redacoes.map((r, i) => `Redação ${i+1}`).reverse() : ["Sem dados"];

                const ctx = document.getElementById('graficoEvolucao').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labelsRedacao,
                        datasets: [{
                            label: 'Evolução Escrita (Notas)',
                            data: notasRedacao,
                            borderColor: '#ffc107',
                            backgroundColor: 'rgba(255, 193, 7, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { min: 0, max: 1000 } }
                    }
                });
            }
        } catch (erro) {
            console.error("Erro ao buscar dados de desempenho:", erro);
        }
    }

    function abrirRevisao(redacao) {
        document.getElementById('painel-revisao').style.display = 'block';
        document.getElementById('revisao-tema').innerText = `Revisão Pedagógica - Tema: ${redacao.tema}`;
        document.getElementById('revisao-texto').innerText = redacao.texto;
        document.getElementById('revisao-feedback').innerText = redacao.feedback;
        document.getElementById('painel-revisao').scrollIntoView({ behavior: 'smooth' });
    }

    carregarDadosDesempenho();
</script>
</body>
</html>

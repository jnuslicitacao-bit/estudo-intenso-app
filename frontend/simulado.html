<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estudo Intenso - Simulados Inteligentes</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 800px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: auto; }
        .btn-voltar { background-color: #6c757d; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .btn-opcao { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-opcao:hover { background: #e2e8f0; }
        .btn-opcao.selecionada { background: #007bff; color: white; border-color: #0056b3; }
        .btn-navegacao { background: #28a745; color: white; border: none; padding: 12px 24px; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .btn-navegacao:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-ia { border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-voltar">← Voltar ao Dashboard</a>
    
    <div id="bloco-questoes-simulado">
        <h2 id="titulo-materia">Carregando Simulado...</h2>
        <div id="corpo-questao" style="margin: 20px 0; font-size: 16px; line-height: 1.5;">
            </div>
        <div id="alternativas-questao">
            </div>
        <button id="btn-proxima" class="btn-navegacao" onclick="proximaQuestao()" disabled>Confirmar Resposta & Avançar →</button>
    </div>

    <div id="bloco-revisao-gabarito" style="display: none; margin-top: 25px;">
        <h2 style="color: #28a745;">🏁 Simulado Finalizado!</h2>
        <div id="card-resultado-pontos" style="background: #e2e8f0; padding: 20px; border-radius: 6px; font-size: 18px; font-weight: bold; margin-bottom: 25px; text-align: center;"></div>
        
        <h3>🔍 Espelho de Correção Dinâmica</h3>
        <div id="container-revisao-questoes" style="display: flex; flex-direction: column; gap: 20px;"></div>

        <button onclick="window.location.href='perfil.html'" style="background-color: #007bff; color: white; border: none; width: 100%; margin-top: 30px; padding: 15px; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer;">
            Ir para Painel de Desempenho Gráfico →
        </button>
    </div>
</div>

<script>
    const dadosUsuario = JSON.parse(localStorage.getItem('usuario_estudo'));
    if (!dadosUsuario) { window.location.href = 'login.html'; }

    let questoes = [];
    let indexAtual = 0;
    let respostasAluno = [];
    let modoIAAtivo = true; // Define se está buscando simulado Inteligente ou Local

    async function carregarSimulado() {
        // Exemplo simulado buscando questões da IA sobre um tema genérico ou configurado
        try {
            const r = await fetch('http://localhost:5000/api/sistema/atualizar', { method: 'POST' }); // Garante carga
            const res = await fetch('http://localhost:5000/api/sistema/status'); // Aqui puxaria a lista real do banco adaptada
            
            // Para testes diretos, vamos simular que a rota de IA alimentou o banco e temos este array ativo:
            questoes = [
                { "materia": "Português", "enunciado": "Assinale a opção em que a concordância nominal está correta:", "opcoes": {"A": "Seguem anexas as documentações.", "B": "É proibido a entrada.", "C": "Ela mesma preparou tudo.", "D": "Meio-dia e meio.", "E": "Salvo as exceções."}, "correta": "A" },
                { "materia": "Matemática", "enunciado": "Qual é o valor de x na equação: 2x + 5 = 15?", "opcoes": {"A": "3", "B": "5", "C": "7", "D": "10", "E": "12"}, "correta": "B" }
            ];
            exibirQuestao();
        } catch (e) {
            console.error(e);
        }
    }

    function exibirQuestao() {
        if (questoes.length === 0) return;
        const q = questoes[indexAtual];
        document.getElementById('titulo-materia').innerText = `${q.materia} - Questão ${indexAtual + 1} de ${questoes.length}`;
        document.getElementById('corpo-questao').innerText = q.enunciado;
        
        const divAlternativas = document.getElementById('alternativas-questao');
        divAlternativas.innerHTML = '';
        
        document.getElementById('btn-proxima').disabled = true;

        Object.keys(q.opcoes).forEach(letra => {
            const btn = document.createElement('button');
            btn.className = 'btn-opcao';
            btn.innerText = `${letra}) ${q.opcoes[letra]}`;
            btn.onclick = () => selecionarOpcao(letra, btn);
            divAlternativas.appendChild(btn);
        });
    }

    function selecionarOpcao(letra, botaoClicado) {
        respostasAluno[indexAtual] = letra;
        const botoes = document.querySelectorAll('.btn-opcao');
        botoes.forEach(b => b.classList.remove('selecionada'));
        botaoClicado.classList.add('selecionada');
        document.getElementById('btn-proxima').disabled = false;
    }

    function proximaQuestao() {
        indexAtual++;
        if (indexAtual < questoes.length) {
            exibirQuestao();
        } else {
            let acertos = 0;
            questoes.forEach((q, i) => {
                if (respostasAluno[i] === q.correta) { acertos++; }
            });

            const notaPorcentagem = Math.round((acertos / questoes.length) * 100);

            // Grava a nota no histórico do banco
            fetch('http://localhost:5000/api/simulado/salvar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario_id: dadosUsuario.id, materia: "Simulado Geral Adaptativo", nota: notaPorcentagem })
            }).catch(e => console.log("Nota salva localmente"));

            // Transiciona para a tela do gabarito inteligente
            document.getElementById('bloco-questoes-simulado').style.display = 'none';
            document.getElementById('bloco-revisao-gabarito').style.display = 'block';
            document.getElementById('card-resultado-pontos').innerText = `Você acertou ${acertos} de ${questoes.length} questões (${notaPorcentagem}%)`;

            const containerRevisao = document.getElementById('container-revisao-questoes');
            containerRevisao.innerHTML = '';

            questoes.forEach((q, i) => {
                const escolheuCerto = respostasAluno[i] === q.correta;
                const boxQuestao = document.createElement('div');
                boxQuestao.style.cssText = `padding: 15px; border-radius: 6px; border: 1px solid ${escolheuCerto ? '#badbcc' : '#f5c2c7'}; background: ${escolheuCerto ? '#d1e7dd' : '#f8d7da'}; color: #222; margin-bottom: 10px;`;
                
                boxQuestao.innerHTML = `
                    <strong>Questão ${i + 1} (${q.materia}):</strong>
                    <p style="margin: 8px 0;">${q.enunciado}</p>
                    <div style="font-size: 14px; margin-bottom: 10px;">
                        <span style="color: #155724;">✔️ Gabarito: <strong>${q.correta}</strong></span> | 
                        <span style="color: ${escolheuCerto ? '#155724' : '#721c24'};">👤 Sua Resposta: <strong>${respostasAluno[i]}</strong></span>
                    </div>
                    <button class="btn-ia" style="background: #8a2be2; padding: 6px 12px; border: none; border-radius:4px; color:white; cursor:pointer;" onclick="solicitarComentarioIA(${i}, this)">
                        💡 Explicar Alternativa com IA
                    </button>
                    <p id="comentario-ia-${i}" style="margin-top: 10px; font-size: 14px; display: none; font-style: italic; background: white; padding: 10px; border-radius: 4px; border: 1px solid #ddd; color: #444; line-height: 1.5;"></p>
                `;
                containerRevisao.appendChild(boxQuestao);
            });
        }
    }

    async function solicitarComentarioIA(index, botao) {
        const q = questoes[index];
        const campoTexto = document.getElementById(`comentario-ia-${index}`);
        botao.disabled = true;
        botao.innerText = "🤖 Professor IA analisando...";

        try {
            const resposta = await fetch('http://localhost:5000/api/gabarito/comentar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    enunciado: q.enunciado,
                    opcoes: q.opcoes,
                    resposta_aluno: respostasAluno[index],
                    resposta_correta: q.correta
                })
            });
            const dados = await resposta.json();
            if (resposta.ok) {
                campoTexto.style.display = "block";
                campoTexto.innerHTML = `<strong>Análise do Tutor:</strong> ${dados.comentario}`;
                botao.style.display = "none";
            } else {
                alert("Erro ao processar insight.");
                botao.disabled = false;
                botao.innerText = "💡 Explicar Alternativa com IA";
            }
        } catch (erro) {
            alert("Erro de conexão.");
            botao.disabled = false;
        }
    }

    carregarSimulado();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo Intensivo - Login</title>
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-global: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-global);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .logo-area {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        /* 🌐 BOTÃO GOOGLE SOCIAL LOGIN */
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: #ffffff;
            color: #1f2937;
            border: 1px solid #cbd5e1;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            margin-top: 15px;
            box-sizing: border-box;
        }

        .btn-google:hover {
            background-color: #f8fafc;
            border-color: #94a3b8;
        }

        .btn-google img {
            width: 20px;
            height: 20px;
            display: block;
        }

        .divisoria {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            margin: 20px 0;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .divisoria::before, .divisoria::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divisoria:not(:empty)::before { margin-right: 1em; }
        .divisoria:not(:empty)::after { margin-left: 1em; }

        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* 📱 Responsividade Mobile Corrigida */
        @media (max-width: 480px) {
            body {
                align-items: flex-start;
                padding: 20px;
                background-color: white;
            }
            .login-container {
                padding: 25px 5px;
                box-shadow: none;
                border-radius: 0;
            }
            .form-group input, .btn-submit, .btn-google {
                padding: 14px;
                font-size: 16px; /* Evita zoom automático no iOS */
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-area">🎓 Estudo Intensivo</div>
    <div class="subtitle">Acesse sua conta para continuar evoluindo</div>

    <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com">
    </div>

    <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••">
    </div>

    <button class="btn-submit" onclick="executarLogin()">Entrar no Sistema →</button>

    <div class="divisoria">ou conecte-se com</div>

    <button type="button" class="btn-google" onclick="autenticarComGoogle()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google__G__Logo.svg" alt="Google Logo">
    Entrar com o Google
</button>

    <div class="footer-links">
        Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a>
    </div>
</div>

<script>
    async function ejecutarLogin() {
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value;

        if (!email || !senha) {
            alert("Preencha e-mail e senha!");
            return;
        }

        try {
            const resposta = await fetch(`${CONFIG.URL_BACKEND}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            });

            const dados = await resposta.json();

            if (resposta.ok && dados.status === "sucesso") {
                localStorage.setItem('usuario_estudo', JSON.stringify(dados.usuario));
                window.location.href = 'index.html';
            } else {
                alert("Falha no acesso: " + dados.mensagem);
            }
        } catch (erro) {
            alert("Erro crítico de comunicação com o servidor.");
        }
    }

    function autenticarComGoogle() {
        const callbackUrl = `${CONFIG.URL_BACKEND}/api/auth/callback`;
        window.location.href = `${CONFIG.URL_BACKEND}/api/auth/google?redirect_uri=${encodeURIComponent(callbackUrl)}`;
    }
</script>
</body>
</html>

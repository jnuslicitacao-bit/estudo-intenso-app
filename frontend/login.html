<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo Intensivo - Login</title>
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-global: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-global);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .logo-area {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
        /* 📱 Responsividade para o Login */
@media (max-width: 480px) {
    body {
        align-items: flex-start;
        padding: 20px;
        background-color: white;
    }
    .auth-card {
        padding: 25px 20px;
        box-shadow: none;
        border-radius: 0;
    }
    input, .btn-auth {
        padding: 14px;
        font-size: 16px; /* Impede zoom no iPhone */
    }
}
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-area">🎓 Estudo Intensivo</div>
    <div class="subtitle">Acesse sua conta para continuar evoluindo</div>

    <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com">
    </div>

    <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••">
    </div>

    <button class="btn-submit" onclick="executarLogin()">Entrar no Sistema →</button>

    <div class="footer-links">
        Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a>
    </div>
</div>

<script>
    async function executarLogin() {
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value;

        if (!email || !senha) {
            alert("Preencha e-mail e senha!");
            return;
        }

        try {
            const resposta = await fetch(`${CONFIG.URL_BACKEND}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            });

            const dados = await resposta.json();

            if (resposta.ok && dados.status === "sucesso") {
                localStorage.setItem('usuario_estudo', JSON.stringify(dados.usuario));
                window.location.href = 'index.html';
            } else {
                alert("Falha no acesso: " + dados.mensagem);
            }
        } catch (erro) {
            alert("Erro crítico de comunicação com o servidor.");
        }
    }
</script>
</body>
</html>
